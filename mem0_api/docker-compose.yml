services:
  mem0-api:
    container_name: mem0-api
    build: .
    restart: unless-stopped
    ports:
      - "18080:8000"
    env_file:
      - .env
    volumes:
      - ./data:/data
    networks:
      - milvus
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  milvus:
    external: true
